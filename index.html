    <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Tela</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background: #0909af;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card{
        background: #2b402c;
        padding: 40px;
        width: 350px;
        text-align: center;
        color: white;
        box-shadow: 0 10px 30px rgba(233, 0, 0, 0.3);
    }

    h1{
        margin-bottom: 15px;
    }

    p{
        color: #c9c9c9;
        margin-bottom: 25px;
    }

    button{
        border: none;
        background: #4a90e2;
        color: white;
        padding: 12px 25px;
        cursor: pointer;
        font-size: 16px;
        transition: .3s;
    }

    button:hover{
        background: #357abd;
    }
</style>
</head>
<body>

    <div class="card">
        <h1>Olá, Leandro!</h1>
        <p>Esta é uma telinha simples feita em HTML e CSS.</p>
        <button>botão</button>
    </div>

</body>
</html>
</body>
</html>
